name: Architecture Drift Detection

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: erode-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  packages: read

jobs:
  erode:
    name: Detect Architecture Drift
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.ERODE_APP_ID }}
          private-key: ${{ secrets.ERODE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Run Erode Analysis
        uses: erode-app/erode@main
        with:
          model-repo: ${{ github.repository }}
          model-path: likec4
          model-ref: main
          ai-provider: gemini
          gemini-api-key: ${{ secrets.GEMINI_API_KEY }}
          github-token: ${{ steps.app-token.outputs.token }}